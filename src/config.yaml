  - name: Chronological_age
    field_id: 21022
    raw_cols: ["p21022"]
    aggregate: first
    unit: "years"
    transform: zscore
    note: "既是特征，也是 acceleration 残差化的协变量；建模时按需放入 X"

# ===== v2 流程：切分 + 调参 =====

split:
  test_ratio: 0.20
  seed: 42
  stratify_age_bins: 5      # 按 age 五分位分层
  by_sex: true              # 男女各自独立切分

tuning:
  n_trials: 30
  inner_folds: 5
  outer_folds: 5
  seed: 42
  pruner: median            # Optuna MedianPruner，提前砍掉明显差的 trial

  # miceforest（v2.1：impute_v2.py 一次性全局 fit；age 不含）
  mice:
    iterations: 5
    random_state: 42

  # 各模型搜索空间（仅 xgb / dnn 调；lr 用 sklearn 默认）
  xgb:
    n_estimators_max: 2000
    early_stopping_rounds: 50
    space:
      max_depth:        {type: int,   low: 3, high: 10}
      learning_rate:    {type: float, low: 0.01, high: 0.3, log: true}
      subsample:        {type: float, low: 0.6, high: 1.0}
      colsample_bytree: {type: float, low: 0.6, high: 1.0}
      min_child_weight: {type: int,   low: 1, high: 20}
      reg_alpha:        {type: float, low: 0.001, high: 10, log: true}
      reg_lambda:       {type: float, low: 0.001, high: 10, log: true}

  dnn:
    epochs_max: 200
    patience: 15
    space:
      n_layers:      {type: int,   low: 2, high: 4}
      hidden_dim:    {type: cat,   choices: [64, 128, 256]}
      dropout:       {type: float, low: 0.0, high: 0.4}
      learning_rate: {type: float, low: 0.0001, high: 0.01, log: true}
      weight_decay:  {type: float, low: 0.000001, high: 0.001, log: true}
      batch_size:    {type: cat,   choices: [256, 512, 1024]}

# ===== v2.2 增量：模块化时钟 + EN + Spearman + GAM =====

# 模块特征 (权威定义在 src/feature_modules.py)；这里仅供参考/文档目的
modules:
  metabolic: [BMI, Glucose, HbA1c, Triglycerides, Cholesterol, LDL_direct, ApolipoproteinA]
  liver:     [ALT, AST, GGT, ALP, Total_bilirubin, Direct_bilirubin, Albumin, Total_protein]
  kidney:    [Creatinine, Urea, CystatinC, Urine_creatinine, Urine_potassium, Urine_sodium, Calcium, Phosphate]
  immune:    [WBC, Neutrophill_count, Lymphocyte_pct, Monocyte_pct, Platelet_count, RDW, CRP]

# ElasticNetCV (sklearn 内置 5-fold 选 alpha + l1_ratio，不走 Optuna)
elastic_net:
  l1_ratio_candidates: [0.1, 0.5, 0.7, 0.9, 0.95, 1.0]
  cv: 5
  n_alphas: 100
  max_iter: 5000
  random_state: 42

# Spearman + BH-FDR 预筛报告
spearman:
  abs_rho_threshold: 0.1
  fdr_alpha: 0.05

# GAM 年龄轨迹 (R + mgcv, family=scat())
gam:
  n_splines: 20                # k 参数
  fdr_alpha: 0.01              # 方案 §12 推荐 FDR<0.01 + edf>3
  edf_threshold: 3.0
  age_grid_min: 38             # UKB baseline 主体范围
  age_grid_max: 73
  age_grid_n: 50

# ===== v2.4 增量：fit-to-death BioAge (EN-Cox + XGB-Cox) =====
# 直接拟合死亡风险（PhenoAge 范式），Gompertz 反解成年龄单位。小程序后端用。
cox:
  drop_died_within_2yr: true           # 沿用 v2.1：基线即将死亡者污染信号
  outer_folds: 5
  seed: 42
  # EN-Cox（sksurv CoxnetSurvivalAnalysis 自带 alpha path + 内部 CV）
  encox:
    l1_ratio_candidates: [0.1, 0.5, 0.7, 0.9, 1.0]
    n_alphas: 100
    inner_cv: 5
    max_iter: 100000
    tol: 1e-7
  # XGB-Cox（objective=survival:cox，Optuna 15 trials）
  xgbcox:
    n_trials: 15
    inner_folds: 5
    n_estimators_max: 800
    early_stopping_rounds: 30
    space:
      max_depth:        {type: int,   low: 3, high: 8}
      learning_rate:    {type: float, low: 0.01, high: 0.3, log: true}
      subsample:        {type: float, low: 0.6, high: 1.0}
      colsample_bytree: {type: float, low: 0.6, high: 1.0}
      min_child_weight: {type: int,   low: 1, high: 20}
      reg_alpha:        {type: float, low: 0.001, high: 10, log: true}
      reg_lambda:       {type: float, low: 0.001, high: 10, log: true}
  # Gompertz 反解参数：UKB train 区按性别独立拟合 mortality_rate(age)=a*exp(b*age)
  gompertz:
    age_bin_width: 5                   # 按 5 岁分箱算观测死亡率
    ref_age: 60                        # 反解锚点
    fit_age_min: 40                    # 拟合用年龄范围（UKB baseline 集中区）
    fit_age_max: 73
