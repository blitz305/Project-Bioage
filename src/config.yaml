# 53 个 ML 输入特征 + 元数据
# 来源：PhenoAge (10) ∪ SDOHAge_Final_Inputs (51)
# 详见 指导文件/markdown/feature_dictionary.md

paths:
  raw_csv: "../指标csv文件/downloads/整合指标.csv"
  data_dir: "../data"
  outputs_dir: "../outputs"

# baseline instance
instance: 0

# 性别字段（UKB Field 31: 0=Female, 1=Male）
sex_col: "p31"

# chronological age — 既是特征，也用作残差化的协变量
age_col: "p21022"
age_field_id: 21022

# 缺失率阈值
# - 列阈值设为 1.0 = 不剔除任何特征列，全部交给 MICE 插补
# - 行阈值 0.15 = 按 SDOHAge 原文，剔除单样本缺失率 > 15% 的参与者
max_col_missing_rate: 1.0
max_row_missing_rate: 0.15

# UKB 特殊编码 → NA
# -1 Do not know, -3 Prefer not to answer, -7 None of the above（看字段单独处理）
generic_na_codes: [-1, -3]

# 多重插补
# v1: sklearn IterativeImputer (供 PhenoAge 公式用，仍保留)
# v2: miceforest 全局一次性插补 (impute_v2.py)，每性别在 train 区 fit 一次
imputation:
  method: "mice"           # sklearn IterativeImputer (v1)
  max_iter: 10
  random_state: 42
  v2_strategy: "global_once"  # v2 用 miceforest，age 排除，train 区 fit，apply 到 train+test

# 标准化
standardize: true

# === 53 个特征清单 ===
features:

  # ---------- 体测/生化 (42) ----------
  - name: BMI
    field_id: 21001
    raw_cols: ["p21001_i0"]
    aggregate: first
    unit: "kg/m2"
    transform: zscore

  - name: DBP
    field_id: 4079
    raw_cols: ["p4079_i0_a0", "p4079_i0_a1"]
    aggregate: mean
    unit: "mmHg"
    transform: zscore

  - name: SBP
    field_id: 4080
    raw_cols: ["p4080_i0_a0", "p4080_i0_a1"]
    aggregate: mean
    unit: "mmHg"
    transform: zscore

  - name: FEV1
    field_id: 3063
    raw_cols: ["p3063_i0_a0", "p3063_i0_a1", "p3063_i0_a2"]
    aggregate: max
    unit: "L"
    transform: zscore

  - name: WBC
    field_id: 30000
    raw_cols: ["p30000_i0"]
    aggregate: first
    unit: "10^9/L"
    transform: zscore

  - name: RBC
    field_id: 30010
    raw_cols: ["p30010_i0"]
    aggregate: first
    unit: "10^12/L"
    transform: zscore

  - name: Haemoglobin
    field_id: 30020
    raw_cols: ["p30020_i0"]
    aggregate: first
    unit: "g/dL"
    transform: zscore

  - name: MCV
    field_id: 30040
    raw_cols: ["p30040_i0"]
    aggregate: first
    unit: "fL"
    transform: zscore

  - name: RDW
    field_id: 30070
    raw_cols: ["p30070_i0"]
    aggregate: first
    unit: "%"
    transform: zscore

  - name: Platelet_count
    field_id: 30080
    raw_cols: ["p30080_i0"]
    aggregate: first
    unit: "10^9/L"
    transform: zscore

  - name: Platelet_crit
    field_id: 30090
    raw_cols: ["p30090_i0"]
    aggregate: first
    unit: "%"
    transform: zscore

  - name: Neutrophill_count
    field_id: 30140
    raw_cols: ["p30140_i0"]
    aggregate: first
    unit: "10^9/L"
    transform: zscore

  - name: Lymphocyte_pct
    field_id: 30180
    raw_cols: ["p30180_i0"]
    aggregate: first
    unit: "%"
    transform: zscore

  - name: Monocyte_pct
    field_id: 30190
    raw_cols: ["p30190_i0"]
    aggregate: first
    unit: "%"
    transform: zscore

  - name: Mean_sphered_cell_volume
    field_id: 30270
    raw_cols: ["p30270_i0"]
    aggregate: first
    unit: "fL"
    transform: zscore

  - name: Urine_creatinine
    field_id: 30510
    raw_cols: ["p30510_i0"]
    aggregate: first
    unit: "umol/L"
    transform: zscore

  - name: Urine_potassium
    field_id: 30520
    raw_cols: ["p30520_i0"]
    aggregate: first
