  # ---------- SDOH (10) ----------
  - name: Townsend
    field_id: 22189
    raw_cols: ["p22189"]
    aggregate: first
    unit: "index"
    transform: zscore

  - name: NO2_2007
    field_id: 24018
    raw_cols: ["p24018"]
    aggregate: first
    unit: "ug/m3"
    transform: zscore

  - name: PM10_2010
    field_id: 24005
    raw_cols: ["p24005"]
    aggregate: first
    unit: "ug/m3"
    transform: zscore

  - name: PM25_2010
    field_id: 24006
    raw_cols: ["p24006"]
    aggregate: first
    unit: "ug/m3"
    transform: zscore

  - name: Daytime_noise
    field_id: 24020
    raw_cols: ["p24020"]
    aggregate: first
    unit: "dB"
    transform: zscore

  - name: Nighttime_noise
    field_id: 24022
    raw_cols: ["p24022"]
    aggregate: first
    unit: "dB"
    transform: zscore

  - name: Education
    field_id: 6138
    raw_cols: ["p6138_i0"]
    aggregate: education_fold
    unit: "ordinal(0..2)"
    transform: zscore
    fold_rule:
      drop_codes: [-3]               # 视为缺失
      keep_codes_as_negative: [-7]   # -7 None of the above 视为最低档参与"取最小"
      pick: min                      # min code = 最高学历
      mapping:                       # 最终 3 档（int 表示有序）
        College and above: [1, 5, 6]
        High school or equivalent: [2]
        Below high school: [3, 4, -7]
      ordered_levels:
        - "Below high school"           # 0
        - "High school or equivalent"   # 1
        - "College and above"           # 2

  - name: Household_income
    field_id: 738
    raw_cols: ["p738_i0"]
    aggregate: first
    unit: "ordinal(1..5)"
    transform: zscore
    na_codes: [-1, -3]

  - name: Friend_family_visits
    field_id: 1031
    raw_cols: ["p1031_i0"]
    aggregate: first
    unit: "ordinal(1..7) reversed"
    transform: zscore
    na_codes: [-1, -3]
    direction_flip: true   # 翻转后大值=社会接触多

  - name: Able_to_confide
    field_id: 2110
    raw_cols: ["p2110_i0"]
    aggregate: first
    unit: "ordinal(0..5)"
    transform: zscore
    na_codes: [-1, -3]

