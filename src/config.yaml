    transform: zscore

  - name: Glucose
    field_id: 30740
    raw_cols: ["p30740_i0"]
    aggregate: first
    unit: "mmol/L"
    transform: zscore

  - name: HbA1c
    field_id: 30750
    raw_cols: ["p30750_i0"]
    aggregate: first
    unit: "mmol/mol"
    transform: zscore

  - name: IGF1
    field_id: 30770
    raw_cols: ["p30770_i0"]
    aggregate: first
